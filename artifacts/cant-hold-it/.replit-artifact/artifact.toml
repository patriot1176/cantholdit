kind = "web"
previewPath = "/"
title = "Can't Hold It"
version = "1.0.0"
id = "artifacts/cant-hold-it"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20503

[services.development]
run = "pnpm --filter @workspace/cant-hold-it run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cant-hold-it", "run", "build" ]
publicDir = "artifacts/cant-hold-it/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20503"
BASE_PATH = "/"
